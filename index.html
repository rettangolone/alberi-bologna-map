<body>

<div id="map"></div>

<script>
console.log("SCRIPT PARTITO");

  container: 'map',

    sources: {},
    layers: [
      {
        id: "background",
        type: "background",
        paint: {
          "background-color": "#eaeaea"
        }
      }
    ]
  },
  center: [11.34, 44.50],
  zoom: 12
});
