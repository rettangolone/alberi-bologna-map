<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Alberi Bologna</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      alberi: {
        type: 'geojson',
        data: 'albo.geojson',
        cluster: true,
        clusterRadius: 40,
        clusterMaxZoom: 14
      }
    },
    layers: [
      {
        id: 'clusters',
        type: 'circle',
        source: 'alberi',
        filter: ['has', 'point_count'],
        paint: {
          'circle-color': '#2ecc71',
          'circle-radius': 18
        }
      },
      {
        id: 'cluster-count',
        type: 'symbol',
        source: 'alberi',
        filter: ['has', 'point_count'],
        layout: {
          'text-field': '{point_count_abbreviated}',
          'text-size': 12
        }
      },
      {
        id: 'unclustered',
        type: 'circle',
        source: 'alberi',
        filter: ['!', ['has', 'point_count']],
        paint: {
          'circle-color': '#27ae60',
          'circle-radius': 4
        }
      }
    ]
  },
  center: [11.34, 44.50],
  zoom: 12
});

// popup
map.on('click', 'unclustered', (e) => {
  const props = e.features[0].properties;
  new maplibregl.Popup()
    .setLngLat(e.lngLat)
    .setHTML(`<b>${props.specie || 'Albero'}</b>`)
    .addTo(map);
});
</script>

</body>
</html>
